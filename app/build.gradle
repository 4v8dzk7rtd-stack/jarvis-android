plugins { id 'com.android.application' }

android {
    namespace 'com.jarvis.local'
    compileSdk 35

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    defaultConfig {
        applicationId 'com.jarvis.local'
        minSdk 23
        targetSdk 35
        versionCode 1
        versionName '0.1'
    }
}
